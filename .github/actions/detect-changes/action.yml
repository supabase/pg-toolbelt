name: Detect Changes
description: Detect which packages have changed

outputs:
  pg-delta:
    description: Whether pg-delta changed
    value: ${{ steps.filter.outputs.pg-delta }}
  pg-delta-package-json:
    description: Whether pg-delta package.json changed
    value: ${{ steps.filter.outputs.pg-delta-package-json }}
  pg-topo:
    description: Whether pg-topo changed
    value: ${{ steps.filter.outputs.pg-topo }}
  pg-topo-package-json:
    description: Whether pg-topo package.json changed
    value: ${{ steps.filter.outputs.pg-topo-package-json }}
  multi-runtime-e2e:
    description: Whether the multi-runtime e2e harness changed
    value: ${{ steps.filter.outputs.multi-runtime-e2e }}
  root:
    description: Whether root config changed
    value: ${{ steps.filter.outputs.root }}

runs:
  using: "composite"
  steps:
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          pg-delta:
            - 'packages/pg-delta/**'
          pg-delta-package-json:
            - 'packages/pg-delta/package.json'
          pg-topo:
            - 'packages/pg-topo/**'
          pg-topo-package-json:
            - 'packages/pg-topo/package.json'
          multi-runtime-e2e:
            - 'packages/pg-delta/**'
            - 'packages/pg-topo/**'
            - '.github/scripts/fixtures/**'
            - 'scripts/e2e-docker.sh'
            - 'package.json'
            - 'bun.lock'
            - '.github/workflows/tests.yml'
            - '.github/actions/setup/action.yml'
            - '.github/actions/detect-changes/action.yml'
          root:
            - 'package.json'
            - 'bunfig.toml'
            - 'biome.json'
            - '.changeset/**'

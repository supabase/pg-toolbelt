name: Setup
description: Install pinned Bun (with toolchain cache + retried fallback installer), Node.js, and project dependencies.

runs:
  using: "composite"
  steps:
    - name: Resolve Bun version
      shell: bash
      run: echo "BUN_VERSION=1.3.13" >> "$GITHUB_ENV"

    - name: Restore Bun toolchain cache
      id: bun-toolchain-cache
      uses: actions/cache@v4
      with:
        path: /opt/hostedtoolcache/bun
        key: bun-toolchain-${{ runner.os }}-${{ runner.arch }}-${{ env.BUN_VERSION }}

    - name: Install Bun
      id: install-bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      continue-on-error: true
      with:
        bun-version: ${{ env.BUN_VERSION }}

    - name: Install Bun (fallback with retries)
      if: steps.install-bun.outcome == 'failure'
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 3
        max_attempts: 5
        retry_wait_seconds: 30
        command: |
          curl -fsSL https://bun.sh/install | bash -s "bun-v${BUN_VERSION}"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

    - name: Verify Bun
      shell: bash
      run: bun --version

    - name: Install Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: "24"
        registry-url: https://registry.npmjs.org

    - name: Install dependencies
      shell: bash
      run: bun install

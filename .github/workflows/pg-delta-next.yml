name: pg-delta-next

on:
  pull_request:
    paths:
      - "packages/pg-delta-next/**"
      - ".github/workflows/pg-delta-next.yml"
  push:
    branches: [main]
    paths:
      - "packages/pg-delta-next/**"

jobs:
  test:
    name: Unit + integration (PG ${{ matrix.postgres_version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        postgres_version: ["15", "17", "18"]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - run: bun install --frozen-lockfile
      - name: Type check
        working-directory: packages/pg-delta-next
        run: bun run check-types
      - name: Unit tests
        working-directory: packages/pg-delta-next
        run: bun test src/
      - name: Integration tests (everything except the corpus proof loop)
        working-directory: packages/pg-delta-next
        env:
          PGDELTA_TEST_IMAGE: postgres:${{ matrix.postgres_version }}-alpine
        run: bun test $(ls tests/*.test.ts | grep -v engine.test.ts)

  corpus:
    name: Corpus proof loop (PG ${{ matrix.postgres_version }}, shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        postgres_version: ["15", "17", "18"]
        shard: ["0/4", "1/4", "2/4", "3/4"]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - run: bun install --frozen-lockfile
      - name: Corpus proof loop (both directions)
        working-directory: packages/pg-delta-next
        env:
          PGDELTA_TEST_IMAGE: postgres:${{ matrix.postgres_version }}-alpine
          PGDELTA_NEXT_SHARD: ${{ matrix.shard }}
        run: bun test tests/engine.test.ts

  benchmark:
    name: Benchmark (informational, PG 17)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - run: bun install --frozen-lockfile
      - name: extract/diff/plan wall-times on the 10k-object fixture
        working-directory: packages/pg-delta-next
        run: bun scripts/benchmark.ts
